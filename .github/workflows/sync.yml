name: Sync Fork (自动获取上游)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:


permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get upstream repository
        id: get-upstream
        run: |
          UPSTREAM=$(gh api repos/${{ github.repository }} --jq '.parent.full_name')
          if [ "$UPSTREAM" == "null" ]; then
            echo "这不是一个 fork 仓库"
            exit 1
          fi
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "✅ 上游仓库: $UPSTREAM"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream (默认分支)
        run: |
          echo "开始同步 fork → 使用上游默认分支"

          gh repo sync ${{ github.repository }} \
            --source ${{ steps.get-upstream.outputs.upstream }} \
            --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
