name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git || true
          git fetch upstream || true

      - name: Check if merge is needed
        id: check
        run: |
          behind=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo 0)
          echo "behind=$behind" >> $GITHUB_OUTPUT
          if [ "$behind" -gt 0 ]; then
            echo "需要同步 $behind 个提交"
          else
            echo "已是最新"
          fi

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: git merge upstream/main --no-edit

      - name: Push changes
        if: steps.check.outputs.behind != '0'
        run: git push
